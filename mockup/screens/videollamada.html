<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Videollamada - Emergencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/app.css">
</head>
<body class="video-body">

<div class="phone-frame" style="background:#0a0a0f">
  <div class="status-bar" style="color:rgba(255,255,255,.7)">
    <span class="time" id="statusTime">12:00</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    </div>
  </div>

  <div class="app">
    <header style="background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);border:none">
      <a href="../index.html" class="back-btn" style="color:rgba(255,255,255,.7)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
      </a>
      <div class="logo" style="-webkit-text-fill-color:rgba(255,255,255,.7)">Videollamada</div>
      <div style="width:40px"></div>
    </header>

    <div class="content">
      <div class="video-area">
        <div class="big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8l-6 4 6 4V8z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg></div>
        <div class="v-label">Conectando</div>
        <div class="pip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg></div>
      </div>

      <div class="connecting-status">
        <div class="pulse-dot"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="4"/><path d="M10 15H4a4 4 0 0 0-4 4v1"/><circle cx="17" cy="17" r="3"/><path d="M21 21l-1.9-1.9"/></svg>
        <span class="c-label">Buscando intérprete LSCh</span>
      </div>

      <div class="video-actions">
        <button class="video-action-btn mic" id="micBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
        </button>
        <button class="video-action-btn end" id="endBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/><path d="M16 11.4A4 4 0 0 0 14.5 6"/><path d="M1 1l22 22"/></svg>
        </button>
      </div>
    </div>

    <nav class="bottom-nav" style="background:rgba(10,10,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06)">
      <a href="../index.html" class="nav-item" style="color:rgba(255,255,255,.5)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
        <span>Home</span>
      </a>
      <a href="seguimiento.html" class="nav-item" style="color:rgba(255,255,255,.5)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
        <span>Seguir</span>
      </a>
      <a href="perfil.html" class="nav-item" style="color:rgba(255,255,255,.5)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
