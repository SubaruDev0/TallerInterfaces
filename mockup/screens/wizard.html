<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Asistente - Emergencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="../css/app.css">
<style>
.sign-image-area{transition:opacity .3s}
.sign-image-area.fade{opacity:0}
.answers-grid{transition:opacity .2s}
.answers-grid.fade{opacity:0;transform:translateY(8px)}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar" style="color:var(--on-surface)">
    <span class="time" id="statusTime">12:00</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    </div>
  </div>

  <div class="app">
    <header>
      <a href="../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
      </a>
      <div class="logo">Asistente</div>
      <div class="header-right">
        <span class="tipo-badge" id="tipoBadge">Violencia</span>
        <a href="perfil.html" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
        </a>
      </div>
    </header>

    <div class="content wizard-content">
      <div class="sign-image-area" id="signArea">
        <img id="signImg" src="" alt="Persona usando lengua de señas" loading="lazy">
        <div class="q-number" id="qNumber">1 / 3</div>
        <div class="q-overlay">
          <span class="q-label" id="qLabel">¿Dónde estás?</span>
        </div>
      </div>

      <div class="answers-grid" id="answersGrid"></div>

      <div class="steps-row" id="stepsRow"></div>

      <div class="nav-row">
        <button class="nav-btn prev" id="prevBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
        </button>
        <button class="nav-btn next" id="nextBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="../index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
        <span>Home</span>
      </a>
      <a href="seguimiento.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
        <span>Seguir</span>
      </a>
      <a href="perfil.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
(function(){
  var tipo = new URLSearchParams(window.location.search).get('tipo') || 'violencia';
  var tipoMap = {violencia:'Violencia', robo:'Robo', accidente:'Accidente', otra:'Otra'};
  document.getElementById('tipoBadge').textContent = tipoMap[tipo] || 'Emergencia';

  var questions = [
    {
      label: "\u00bfD\u00f3nde est\u00e1s?",
      image: "https://images.unsplash.com/photo-1593062096033-9a26b09da705?w=400&h=300&fit=crop&auto=format",
      answers: [
        { id:"a1", label:"Casa" },
        { id:"a2", label:"Calle" },
        { id:"a3", label:"Trabajo" },
        { id:"a4", label:"Otro" }
      ]
    },
    {
      label: "\u00bfEst\u00e1 armado?",
      image: "https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=400&h=300&fit=crop&auto=format",
      answers: [
        { id:"b1", label:"S\u00ed" },
        { id:"b2", label:"No" },
        { id:"b3", label:"No s\u00e9" },
        { id:"b4", label:"Probable" }
      ]
    },
    {
      label: "\u00bfQu\u00e9 arma?",
      image: "https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=400&h=300&fit=crop&auto=format",
      answers: [
        { id:"c1", label:"Blanca" },
        { id:"c2", label:"Fuego" },
        { id:"c3", label:"Otra" },
        { id:"c4", label:"Ninguna" }
      ]
    }
  ];

  var currentStep = 0;
  var selected = [null, null, null];
  var signImg = document.getElementById('signImg');
  var qLabel = document.getElementById('qLabel');
  var qNumber = document.getElementById('qNumber');
  var answersGrid = document.getElementById('answersGrid');
  var signArea = document.getElementById('signArea');
  var stepsRow = document.getElementById('stepsRow');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function renderDots(){
    stepsRow.innerHTML = '';
    for(var i=0;i<questions.length;i++){
      var dot = document.createElement('div');
      dot.className = 'step-dot';
      if(i===currentStep) dot.classList.add('active');
      else if(i<currentStep) dot.classList.add('done');
      stepsRow.appendChild(dot);
    }
  }

  function renderAnswers(){
    var q = questions[currentStep];
    qLabel.textContent = q.label;
    qNumber.textContent = (currentStep+1)+' / '+questions.length;

    signArea.classList.add('fade');
    answersGrid.classList.add('fade');

    setTimeout(function(){
      signImg.src = q.image;
      signImg.alt = "Persona mostrando: "+q.label+" en lengua de se\u00f1as";
      signArea.classList.remove('fade');

      answersGrid.innerHTML = '';
      q.answers.forEach(function(a){
        var card = document.createElement('div');
        card.className = 'answer-card';
        if(selected[currentStep]===a.id) card.classList.add('selected');
        card.innerHTML =
          '<div class="a-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="8" r="2.5"/><circle cx="12" cy="16" r="2.5"/></svg></div>'+
          '<span class="a-label">'+a.label+'</span>';
        card.addEventListener('click', (function(id){return function(){selectAnswer(id);};})(a.id));
        answersGrid.appendChild(card);
      });

      requestAnimationFrame(function(){
        answersGrid.classList.remove('fade');
      });
    }, 200);

    prevBtn.disabled = currentStep===0;
    var isLast = currentStep===questions.length-1;
    if(isLast){
      nextBtn.classList.add('send');
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>';
    } else {
      nextBtn.classList.remove('send');
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>';
    }
  }

  function selectAnswer(id){
    selected[currentStep] = id;
    var cards = answersGrid.querySelectorAll('.answer-card');
    for(var i=0;i<cards.length;i++) cards[i].classList.remove('selected');
    for(var i=0;i<cards.length;i++){
      var lbl = cards[i].querySelector('.a-label');
      if(lbl && lbl.textContent===getLabelById(id)){
        cards[i].classList.add('selected');
        break;
      }
    }
  }

  function getLabelById(id){
    for(var i=0;i<questions.length;i++)
      for(var j=0;j<questions[i].answers.length;j++)
        if(questions[i].answers[j].id===id) return questions[i].answers[j].label;
    return '';
  }

  function goToStep(s){
    if(s<0||s>=questions.length) return;
    currentStep = s;
    renderDots();
    renderAnswers();
  }

  prevBtn.addEventListener('click', function(){
    if(currentStep>0) goToStep(currentStep-1);
  });

  nextBtn.addEventListener('click', function(){
    if(!selected[currentStep]){
      document.body.classList.add('swal-blur');
      Swal.fire({
        icon:'warning',
        title:'Selecciona una opci\u00f3n',
        text:'Elige una respuesta antes de continuar',
        background:'#ecfdf5',
        color:'#065f46',
        confirmButtonColor:'#047857',
        confirmButtonText:'OK',
        didOpen:function(){document.body.classList.add('swal-blur')},
        willClose:function(){document.body.classList.remove('swal-blur')}
      });
      return;
    }
    if(currentStep===questions.length-1){
      document.body.classList.add('swal-blur');
      Swal.fire({
        icon:'success',
        title:'Alerta enviada',
        text:'Carabineros recibi\u00f3 tu alerta de '+tipoMap[tipo],
        background:'#ecfdf5',
        color:'#065f46',
        confirmButtonColor:'#047857',
        confirmButtonText:'Ver estado',
        timer:5000,
        timerProgressBar:true,
        didOpen:function(){document.body.classList.add('swal-blur')},
        willClose:function(){
          document.body.classList.remove('swal-blur');
          window.location.href='seguimiento.html';
        }
      }).then(function(r){
        if(r.isConfirmed) window.location.href='seguimiento.html';
      });
    } else {
      goToStep(currentStep+1);
    }
  });

  renderDots();
  renderAnswers();
})();
</script>
</body>
</html>
